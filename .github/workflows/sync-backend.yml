name: Sync Frontend from Backend Changes
on:
  repository_dispatch:
    types: [backend-updated]
    # payload: { commit_message, diff, repo }

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Analyze & Update
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BACKEND_DIFF: ${{ github.event.client_payload.diff }}
          COMMIT_MSG: ${{ github.event.client_payload.commit_message }}
        run: |
          node --input-type=commonjs << 'EOF'
          const fs = require('fs');
          const path = require('path');

          function getFiles(dir) {
            let results = [];
            for (const f of fs.readdirSync(dir, { withFileTypes: true })) {
              const full = path.join(dir, f.name);
              if (f.isDirectory() && !f.name.includes('node_modules')) {
                results = results.concat(getFiles(full));
              } else if (f.name.endsWith('.ts') || f.name.endsWith('.tsx')) {
                results.push(full);
              }
            }
            return results;
          }

          const files = getFiles('src');
          const fileContents = files.map(f =>
            `--- ${f} ---\n${fs.readFileSync(f, 'utf-8')}`
          ).join('\n\n');

          const res = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'x-api-key': process.env.ANTHROPIC_API_KEY,
              'anthropic-version': '2023-06-01',
            },
            body: JSON.stringify({
              model: 'claude-sonnet-4-5-20250929',
              max_tokens: 8192,
              messages: [{
                role: 'user',
                content: `백엔드 커밋:
          ${process.env.COMMIT_MSG}

          백엔드 diff:
          ${process.env.BACKEND_DIFF}

          프론트엔드 코드:
          ${fileContents}

          이 diff를 분석하여 프론트엔드 코드를 수정하세요.
          - 기존 파일만 수정, 새 파일 금지
          - 변경 불필요한 파일 제외
          - 순수 JSON만 반환: {"files": [{"path": "...", "content": "..."}]}`
              }],
            }),
          });

          const data = await res.json();
          let text = data.content[0].text;
          text = text.replace(/```json\s*/g, '').replace(/```/g, '');
          const result = JSON.parse(text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1));

          for (const file of result.files) {
            fs.writeFileSync(file.path, file.content);
            console.log('Updated:', file.path);
          }
          EOF

      - name: Create PR
        uses: peter-evans/create-pull-request@v5
        with:
          branch: ai/update-api-${{ github.run_number }}
          title: "feat: ${{ github.event.client_payload.commit_message }}"
          body: "백엔드 변경에 따른 프론트엔드 자동 업데이트"